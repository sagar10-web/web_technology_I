<!DOCTYPE html>
<html>
<head>
    <title>Sagar Ghimire - Program 20</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<h2>Program 20: jQuery Hide/Show</h2>

<p id="text">This is a paragraph to hide and show.</p>
<button id="btn">Hide/Show</button>

<script>
$("#btn").click(function() {
    $("#text").toggle();
});
</script>

</body>
</html>
