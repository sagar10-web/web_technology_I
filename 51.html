<h2>Program 11: Change Background Color</h2>
<button onclick="changeColor()">Change Background Color</button>

<script>
function changeColor() {
    document.body.style.backgroundColor =
        "#" + Math.floor(Math.random() * 16777215).toString(16);
}
</script>
