<!DOCTYPE html>
<html>
<head><title>Sagar Ghimire - Program 6</title></head>
<body>
<div id="output"></div>

<script>
let text = "";
for (let i = 1; i <= 100; i++) {
    if (i % 15 === 0) text += "FizzBuzz<br>";
    else if (i % 3 === 0) text += "Fizz<br>";
    else if (i % 5 === 0) text += "Buzz<br>";
    else text += i + "<br>";
}
document.getElementById("output").innerHTML = text;
</script>
</body>
</html>
