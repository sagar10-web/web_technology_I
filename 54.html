<h2>Program 13: Sum and Average</h2>

<script>
let numbers = [10, 20, 30, 40, 50];

function calc() {
    let sum = 0;
    for (let n of numbers) sum += n;

    let avg = sum / numbers.length;

    document.write("Numbers: " + numbers + "<br>");
    document.write("Sum: " + sum + "<br>");
    document.write("Average: " + avg);
}

calc();
</script>
