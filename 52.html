<body>

<h2>Program 12: Student Object</h2>

<script>
let student = {
    name: "Sagar",
    age: 21,
    rollNo: 12,
    displayInfo: function() {
        document.write("Name: " + this.name + "<br>");
        document.write("Age: " + this.age + "<br>");
        document.write("Roll No: " + this.rollNo);
    }
};

student.displayInfo();
</script>

</body>
