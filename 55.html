<body>

<h2>Program 15: Date and Time</h2>

<script>
let d = new Date();

let day = d.getDate();
let month = d.getMonth() + 1;
let year = d.getFullYear();

let hour = d.getHours();
let min = d.getMinutes();
let sec = d.getSeconds();

document.write(
    day + "/" + month + "/" + year + " " +
    hour + ":" + min + ":" + sec
);
</script>

</body>
</html>
