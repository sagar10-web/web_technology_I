<h2>Program 17: Email Validation</h2>

<script>
let email = prompt("Enter email:");
let pattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if (pattern.test(email)) {
    alert("Valid Email");
} else {
    alert("Invalid Email");
}
</script>
